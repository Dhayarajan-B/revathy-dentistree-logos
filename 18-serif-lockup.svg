<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200">
  <!-- Serif House Lockup: pure typographic luxury, one gold leaf nested in the fork of the Y -->
  <g transform="translate(800 592) scale(1.12) translate(-800 -600)">
    <!-- gold leaf nested in the fork of the Y of REVATHY: base dips into the notch, tip leans right -->
    <path d="M 672 554 Q 695 527 684 494 Q 660 516 672 554 Z" fill="#b58c44"/>
    <!-- wordmark -->
    <text x="805" y="600" font-family="Georgia, 'Times New Roman', serif" font-size="80" font-weight="700" letter-spacing="10" text-anchor="middle" fill="#1b4d3e">REVATHY DENTISTREE</text>
    <!-- split hairline rule with centre diamond: the jeweller's rule -->
    <line x1="460" y1="650" x2="780" y2="650" stroke="#b58c44" stroke-width="1.5"/>
    <line x1="820" y1="650" x2="1140" y2="650" stroke="#b58c44" stroke-width="1.5"/>
    <path d="M 800 641 L 809 650 L 800 659 L 791 650 Z" fill="#b58c44"/>
    <!-- tagline -->
    <text x="801.5" y="716" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-style="italic" font-weight="400" letter-spacing="3" text-anchor="middle" fill="#8a6a2e">Growing Miles of Smiles</text>
  </g>
</svg>
