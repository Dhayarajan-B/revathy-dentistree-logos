<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200">
  <!-- Infinity Smile: one continuous ribbon stroke. The deep bowl (elliptical arc,
       rx 225 / ry 185 about 800,540 - wider than tall, a true smile) is the patient outcome;
       the two arms rise as mirrored lazy-S curves that cross once at (800,323) and sprout
       upward. Left tail ends in a rounded bud (the patient today); right tail resolves into
       a gold leaf (the same patient grown and flourishing). -->
  <path d="M 935 225
           C 906 305 681 358 616 434
           A 225 185 0 1 0 984 434
           C 919 358 694 305 665 225"
        fill="none" stroke="#1b4d3e" stroke-width="52" stroke-linecap="round"/>
  <!-- Bud terminal (left tail) -->
  <circle cx="665" cy="225" r="37" fill="#1b4d3e"/>
  <!-- Gold leaf terminal (right tail): base chord is exactly stroke-width wide and sits
       flush across the stem tip, so the stem tapers seamlessly into the leaf -->
  <path d="M 959 234 Q 1019 223 1025 137 Q 951 155 910 216 Z" fill="#b58c44"/>

  <!-- Lockup -->
  <text x="800" y="905" font-family="Playfair Display, Georgia, serif" font-size="76" font-weight="800" letter-spacing="10" text-anchor="middle" fill="#1b4d3e">REVATHY DENTISTREE</text>
  <rect x="690" y="936" width="220" height="3" rx="1.5" fill="#b58c44"/>
  <text x="800" y="1002" font-family="Playfair Display, Georgia, serif" font-size="40" font-style="italic" font-weight="500" letter-spacing="3" text-anchor="middle" fill="#8a6a2e">Growing Miles of Smiles</text>
</svg>
