<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200">
  <!-- Banyan of Care: broad crescent canopy with a lifted, smile-echoing underside,
       flared central trunk, two pairs of tapered aerial prop roots (the banyan
       signature), sheltering a tapered gold smile arc beneath. -->

  <!-- Aerial prop roots: slender waisted columns reaching the same ground line
       as the trunk - the banyan signature of new growth taking root -->
  <path d="M 585 410 C 590 500 592 560 583 642
           L 625 642
           C 616 560 618 500 623 410 Z" fill="#0f2d24"/>
  <path d="M 977 410 C 982 500 984 560 975 642
           L 1017 642
           C 1008 560 1010 500 1015 410 Z" fill="#0f2d24"/>
  <path d="M 484 375 C 489 470 491 545 482 642
           L 518 642
           C 509 545 511 470 516 375 Z" fill="#0f2d24"/>
  <path d="M 1084 375 C 1089 470 1091 545 1082 642
           L 1118 642
           C 1109 545 1111 470 1116 375 Z" fill="#0f2d24"/>

  <!-- Central trunk with flared buttress base -->
  <path d="M 758 415
           C 762 500 748 580 700 642
           L 900 642
           C 852 580 838 500 842 415 Z" fill="#0f2d24"/>

  <!-- Canopy: broad crescent, underside lifts toward the tips like a smile -->
  <path d="M 410 350
           C 455 225 615 180 800 180
           C 985 180 1145 225 1190 350
           C 1075 420 940 445 800 445
           C 660 445 525 420 410 350 Z" fill="#1b4d3e"/>

  <!-- Sheltered smile arc: tapered, thick at centre -->
  <path d="M 600 700
           C 672 800 928 800 1000 700
           C 928 734 672 734 600 700 Z" fill="#b58c44"/>

  <!-- Lockup -->
  <text x="800" y="905" font-family="Playfair Display, Georgia, serif" font-size="76" font-weight="800" letter-spacing="10" text-anchor="middle" fill="#1b4d3e">REVATHY DENTISTREE</text>
  <rect x="710" y="936" width="180" height="3" rx="1.5" fill="#b58c44"/>
  <text x="800" y="1002" font-family="Playfair Display, Georgia, serif" font-size="40" font-style="italic" font-weight="500" letter-spacing="3" text-anchor="middle" fill="#8a6a2e">Growing Miles of Smiles</text>
</svg>
