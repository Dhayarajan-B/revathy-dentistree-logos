<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200">
  <!-- REVATHY DENTISTREE - Concept 03 "Root & Rise" - full-colour master -->
  <!-- One continuous organism: the stem crosses the horizon and enters the buried tooth. -->
  <!-- Root tips and branch tips both land at x = 800 +/- 50 : point-for-point mirror. -->
  <g transform="translate(0,-30)">
    <!-- Horizon: the gumline and the soil line at once -->
    <line x1="560" y1="470" x2="1040" y2="470" stroke="#1b4d3e" stroke-width="12" stroke-linecap="round"/>
    <!-- Stem: passes through the horizon, rooted inside the tooth crown -->
    <path d="M800,528 L800,346" stroke="#1b4d3e" stroke-width="16" stroke-linecap="round" fill="none"/>
    <!-- Branches fork to tips at (750,346) and (850,346) -->
    <path d="M800,424 C800,394 784,366 750,346" stroke="#1b4d3e" stroke-width="13" stroke-linecap="round" fill="none"/>
    <path d="M800,424 C800,394 816,366 850,346" stroke="#1b4d3e" stroke-width="13" stroke-linecap="round" fill="none"/>
    <!-- The tooth planted below: twin roots splay and taper to tips at (750,762) and (850,762) -->
    <path d="M757,500 L843,500 C897,500 921,530 919,576 C917,614 906,640 888,664 C871,690 866,720 864,746 C861,768 839,766 837,748 C833,712 815,686 800,678 C785,686 767,712 763,748 C761,766 739,768 736,746 C734,720 729,690 712,664 C694,640 683,614 681,576 C679,530 703,500 757,500 Z" fill="#1b4d3e"/>
    <!-- Side leaves: growth mirroring the roots -->
    <path d="M0,0 C-30,-22 -34,-78 0,-118 C34,-78 30,-22 0,0 Z" transform="translate(750 346) rotate(-44)" fill="#1b4d3e"/>
    <path d="M0,0 C-30,-22 -34,-78 0,-118 C34,-78 30,-22 0,0 Z" transform="translate(850 346) rotate(44)" fill="#1b4d3e"/>
    <!-- Crowning gold leaf: the visible outcome, the smile -->
    <path d="M0,0 C-28,-20 -32,-74 0,-112 C32,-74 28,-20 0,0 Z" transform="translate(800 340)" fill="#b58c44"/>
    <!-- Gold divider strip -->
    <rect x="690" y="830" width="220" height="4" rx="2" fill="#b58c44"/>
    <text x="800" y="946" font-family="Playfair Display, Georgia, serif" font-size="72" font-weight="800" letter-spacing="8" fill="#1b4d3e" text-anchor="middle">REVATHY DENTISTREE</text>
    <text x="800" y="1020" font-family="Playfair Display, Georgia, serif" font-size="42" font-style="italic" font-weight="500" letter-spacing="3" fill="#8a6a2e" text-anchor="middle">Growing Miles of Smiles</text>
  </g>
</svg>
