<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="200 154 1200 900">
  <!-- 10 THE CREST - modern-heraldic shield sheltering the tree-tooth glyph -->
  <!-- Shield field with gold border -->
  <path d="M564 200 H1036 Q1052 200 1052 216 V430 Q1052 640 800 772 Q548 640 548 430 V216 Q548 200 564 200 Z" fill="#1b4d3e" stroke="#b58c44" stroke-width="12"/>
