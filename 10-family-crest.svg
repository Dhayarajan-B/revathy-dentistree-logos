    <circle cx="800" cy="330" r="70"/>
    <circle cx="733" cy="392" r="51"/>
    <circle cx="867" cy="392" r="51"/>
    <path d="M780 373 C780 440 779 480 776 515 C771 545 764 570 758 594 C753 613 750 622 751 628 Q752 638 762 636 Q770 634 774 622 C780 605 788 596 800 588 C812 596 820 605 826 622 Q830 634 838 636 Q848 638 849 628 C850 622 847 613 842 594 C836 570 829 545 824 515 C821 480 820 440 820 373 Z"/>
  </g>

  <!-- gold ground arc: the Villupuram soil the practice grows from -->
  <path d="M728 668 Q800 702 872 668" fill="none" stroke="#b58c44" stroke-width="12" stroke-linecap="round"/>

  <!-- Lockup -->
  <text x="800" y="944" font-family="Playfair Display, Georgia, serif" font-size="60" font-weight="800" letter-spacing="6" text-anchor="middle" fill="#1b4d3e">REVATHY DENTISTREE</text>
  <text x="800" y="1004" font-family="Playfair Display, Georgia, serif" font-size="34" font-style="italic" letter-spacing="2.5" text-anchor="middle" fill="#8a6a2e">Growing Miles of Smiles</text>
</svg>
