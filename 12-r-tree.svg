<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200">
  <!-- 12 THE R TREE - custom letter R whose leg grows into a leafed branch -->
  <g fill="none" stroke="#1b4d3e" stroke-linecap="round">
    <!-- stem -->
    <path d="M605 268 V660" stroke-width="56"/>
    <!-- bowl -->
    <path d="M605 268 C805 268 805 470 605 470" stroke-width="56"/>
    <!-- leg flowing through the baseline and rising as a branch -->
    <path d="M615 472 C700 515 745 698 828 698 C900 698 928 620 956 530" stroke-width="44"/>
  </g>

  <!-- two leaves fanning from the branch tip -->
  <g fill="#b58c44">
    <path d="M952 536 Q961 464 1032 448 Q1023 520 952 536 Z"/>
    <path d="M948 530 Q956 472 904 445 Q896 503 948 530 Z"/>
  </g>

  <!-- Lockup -->
  <text x="800" y="850" font-family="Playfair Display, Georgia, serif" font-size="76" font-weight="800" letter-spacing="10" text-anchor="middle" fill="#1b4d3e">REVATHY DENTISTREE</text>
  <text x="800" y="912" font-family="Playfair Display, Georgia, serif" font-size="34" font-style="italic" letter-spacing="2" text-anchor="middle" fill="#8a6a2e">Growing Miles of Smiles</text>
</svg>
