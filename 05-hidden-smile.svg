<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200">
  <!-- Hidden Smile: tree canopy whose negative space is a smile -->
  <defs>
    <linearGradient id="strip" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1b4d3e"/>
      <stop offset="1" stop-color="#b58c44"/>
    </linearGradient>
  </defs>
  <g transform="translate(-80,-60) scale(1.1)">
    <!-- trunk (drawn first, tucked under canopy) -->
    <path d="M764 548 C770 635 758 686 718 732 L882 732 C842 686 830 635 836 548 Z" fill="#b58c44"/>
    <!-- canopy: three-lobe arc silhouette, rounded base corners, smile crescent cut as true negative space -->
    <path d="M557.8 555.6 A151 151 0 0 1 614 292 A191 191 0 0 1 986 292 A151 151 0 0 1 1042.2 555.6 A20 20 0 0 1 1029.7 560 L570.3 560 A20 20 0 0 1 557.8 555.6 Z M655 388 Q800 580 945 388 Q800 455 655 388 Z" fill="#1b4d3e" fill-rule="evenodd"/>
    <!-- green-to-gold rule -->
    <rect x="710" y="983" width="180" height="5" fill="url(#strip)"/>
    <!-- lockup -->
    <text x="800" y="948" font-family="Playfair Display, Georgia, serif" font-size="76" font-weight="800" letter-spacing="10" text-anchor="middle" fill="#1b4d3e">REVATHY DENTISTREE</text>
    <text x="800" y="1052" font-family="Playfair Display, Georgia, serif" font-size="40" font-style="italic" font-weight="500" letter-spacing="1.5" text-anchor="middle" fill="#8a6a2e">Growing Miles of Smiles</text>
  </g>
</svg>
